<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey | M Zaenal Profil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">M Zaenal.</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Kontak</a></li>
        </ul>
    </nav>

    <!-- KONTEN UTAMA -->
    <section class="container animasi-masuk">
        <div class="card">
            <h1>Survey Kepuasan</h1>
            <p class="subtitle">Bantu kami meningkatkan kualitas layanan</p>

            <form>
                <!-- Data Pelanggan -->
                <label>Nama Lengkap:</label>
                <input type="text" placeholder="Masukkan nama Anda">

                <label>Alamat:</label>
                <input type="text" placeholder="Masukkan alamat lengkap">

                <label>No. Telepon:</label>
                <input type="tel" placeholder="Contoh: 08123456789">

                <!-- Dropdown -->
                <label>Kategori Pelanggan:</label>
                <select>
                    <option disabled selected>-- Pilih Kategori --</option>
                    <option>Pelanggan Baru</option>
                    <option>Pelanggan Tetap</option>
                    <option>Pelanggan VIP</option>
                </select>

                <!-- Checkbox -->
                <label>Produk yang Disukai:</label>
                <div class="option-group">
                    <label class="inline-option">
                        <input type="checkbox"> Layanan Web Design
                    </label>
                    <label class="inline-option">
                        <input type="checkbox"> Pengembangan Aplikasi
                    </label>
                    <label class="inline-option">
                        <input type="checkbox"> Konsultasi IT
                    </label>
                </div>

                <!-- Radio Button -->
                <label>Tingkat Kepuasan:</label>
                <div class="option-group">
                    <label class="inline-option">
                        <input type="radio" name="kepuasan"> Sangat Puas
                    </label>
                    <label class="inline-option">
                        <input type="radio" name="kepuasan"> Puas
                    </label>
                    <label class="inline-option">
                        <input type="radio" name="kepuasan"> Cukup
                    </label>
                    <label class="inline-option">
                        <input type="radio" name="kepuasan"> Tidak Puas
                    </label>
                </div>

                <!-- Text Area -->
                <label>Komentar & Saran:</label>
                <textarea rows="4" placeholder="Tulis masukan Anda di sini..."></textarea>

                <!-- Button -->
                <div class="btn-group">
                    <button type="submit" class="btn-submit">Kirim Survey</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>
            
            <p style="color: #94a3b8; font-size: 12px; margin-top: 40px; text-align: center;">&copy; 2024 M Zaenal Khoirul Zaman - UTS Pemrograman Web</p>
        </div>
    </section>

</body>
</html>
